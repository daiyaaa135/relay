version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js (App Router)
  - ui_library: React
  - other: Tailwind CSS
routes:
  - path: /
    file: app/page.tsx
    auth_required: true
    description: Main Relay swap dashboard and messaging experience
features:
  - name: Swap Dashboard
    description: Users can browse, filter, and manage swaps on the main dashboard.
    files:
      - app/page.tsx
    entry_route: /
    user_interactions:
      - View list of active and pending swaps
      - Filter or sort swaps (e.g. by status or recency)
      - Open a swap to view detailed information
      - Navigate between different sections of the dashboard
    api_calls:
      - method: GET
        endpoint: /api/swaps/get-or-create
    auth_required: true
  - name: Swap Creation and Matching
    description: Users can initiate or get matched into a swap via server-side logic.
    files:
      - app/page.tsx
      - app/api/swaps/get-or-create/route.ts
    entry_route: /
    user_interactions:
      - Initiate a new swap from the main experience
      - Confirm participation in a suggested swap
      - See swap state update after creation or matching
    api_calls:
      - method: POST
        endpoint: /api/swaps/get-or-create
    auth_required: true
  - name: Messaging and Read Receipts
    description: Users can exchange messages in the context of a swap and mark messages as read.
    files:
      - app/page.tsx
      - app/api/messages/mark-read/route.ts
    entry_route: /
    user_interactions:
      - Open a swap conversation thread
      - Scroll through existing messages
      - Send a new message
      - Mark messages as read when viewing the thread
    api_calls:
      - method: POST
        endpoint: /api/messages/mark-read
    auth_required: true
  - name: Authentication Placeholder
    description: Temporary placeholder route for sign up or login flows used during development.
    files:
      - app/sign-up-or-login-placeholder
    entry_route: /sign-up-or-login-placeholder
    user_interactions:
      - Navigate to placeholder auth page
      - View messaging indicating auth is required or pending implementation
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Authentication flow is currently a placeholder and not a full signup/login implementation.
    location: app/sign-up-or-login-placeholder
    impact: Users cannot complete real authentication via this route and must rely on alternate or development auth mechanisms.
